name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Run app tests
        run: swift test

      - name: Run core tests
        run: swift test --package-path Core

      - name: Build release app executable
        run: swift build -c release --product garbageman
