name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 45
    env:
      HOMEBREW_TAP_REPO: yunusemreyakisan/homebrew-tap
      REQUIRE_DEVELOPER_IDENTITY: "1"
      REQUIRE_NOTARIZATION: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Show Swift version
        run: swift --version

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail

          version="$(
            sed -n 's/.*static let version = "\(.*\)".*/\1/p' Sources/GarbagemanDesktop/AppBuildInfo.swift | head -n 1
          )"

          if [[ -z "$version" ]]; then
            echo "Unable to determine app version." >&2
            exit 1
          fi

          tag="v$version"
          current_commit="$(git rev-parse HEAD)"
          tag_exists="false"
          should_release="true"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            tag_exists="true"
            tagged_commit="$(git rev-list -n 1 "$tag")"

            if [[ "$tagged_commit" != "$current_commit" ]]; then
              echo "Version $version is already tagged on $tagged_commit; skipping release for this commit."
              should_release="false"
            fi
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$tag_exists" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

      - name: Validate release secrets
        if: steps.version.outputs.should_release == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          missing=()
          for secret_name in BUILD_CERTIFICATE_BASE64 P12_PASSWORD KEYCHAIN_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!secret_name:-}" ]]; then
              missing+=("$secret_name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required release secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Install signing certificate
        if: steps.version.outputs.should_release == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/garbageman-signing.keychain-db"

          if base64 --decode </dev/null >/dev/null 2>&1; then
            printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          else
            printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 -D > "$certificate_path"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"

          existing_keychains=()
          while IFS= read -r line; do
            existing_keychains+=("${line//\"/}")
          done < <(security list-keychains -d user | sed 's/^[[:space:]]*//')

          security list-keychains -d user -s "$keychain_path" "${existing_keychains[@]}"
          security default-keychain -d user -s "$keychain_path"

          developer_identity="$(
            security find-identity -v -p codesigning "$keychain_path" \
              | sed -n 's/.*) \(Developer ID Application:.*\)/\1/p' \
              | head -n 1
          )"

          if [[ -z "$developer_identity" ]]; then
            echo "Unable to find a Developer ID Application identity in the imported certificate." >&2
            exit 1
          fi

          echo "DEVELOPER_IDENTITY=$developer_identity" >> "$GITHUB_ENV"

      - name: Run app tests
        run: swift test

      - name: Run core tests
        run: swift test --package-path Core

      - name: Build DMG
        if: steps.version.outputs.should_release == 'true'
        env:
          DEVELOPER_IDENTITY: ${{ env.DEVELOPER_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/package-dmg.sh

      - name: Prepare release assets
        if: steps.version.outputs.should_release == 'true'
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          mv "dist/garbageman.dmg" "dist/garbageman-${version}.dmg"
          shasum -a 256 "dist/garbageman-${version}.dmg" > "dist/garbageman-${version}.dmg.sha256"

      - name: Create tag
        if: steps.version.outputs.should_release == 'true' && steps.version.outputs.tag_exists != 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "garbageman ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub Release
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"
          title="garbageman ${tag}"
          assets=(
            "dist/garbageman-${version}.dmg"
            "dist/garbageman-${version}.dmg.sha256"
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" --title "$title" --generate-notes
          fi

      - name: Update Homebrew cask
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping Homebrew cask update."
            exit 0
          fi

          version="${{ steps.version.outputs.version }}"
          tag="${{ steps.version.outputs.tag }}"
          dmg_name="garbageman-${version}.dmg"
          dmg_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${dmg_name}"
          sha256="$(cut -d' ' -f1 "dist/${dmg_name}.sha256")"
          temp_dir="$(mktemp -d)"
          tap_dir="$temp_dir/tap"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" "$tap_dir"
          mkdir -p "$tap_dir/Casks"

          cat > "$tap_dir/Casks/garbageman.rb" <<EOF
          cask "garbageman" do
            version "${version}"
            sha256 "${sha256}"

            url "${dmg_url}"
            name "garbageman"
            desc "Minimal macOS disk cleanup app"
            homepage "https://github.com/${GITHUB_REPOSITORY}"

            app "Garbageman.app"
          end
          EOF

          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/garbageman.rb
          git commit -m "Update garbageman cask to ${tag}" || exit 0
          git push origin HEAD:stable
